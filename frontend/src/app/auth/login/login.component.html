<div class="auth-card">
  <div class="auth-header">
    <div class="brand-logo">
      <span class="material-icons-round">school</span>
    </div>
    <h2>Welcome Back</h2>
    <p class="subtitle">Sign in to continue to ELearn</p>
  </div>

  <div *ngIf="errorMsg" class="error-alert">
    <span class="material-icons-round">error_outline</span>
    {{ errorMsg }}
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
    
    <div class="form-group">
      <label for="email">Email Address</label>
      <div class="input-wrapper">
        <span class="material-icons-round input-icon">email</span>
        <input 
          id="email" 
          type="email" 
          formControlName="email" 
          placeholder="student@elearn.com"
          [class.invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        />
      </div>
    </div>

    <div class="form-group">
      <div class="label-row">
        <label for="password">Password</label>
        <a routerLink="/auth/forgot-password" class="forgot-link">Forgot password?</a>
      </div>
      <div class="input-wrapper">
        <span class="material-icons-round input-icon">lock</span>
        <input 
          id="password" 
          type="password" 
          formControlName="password" 
          placeholder="••••••••"
          [class.invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        />
      </div>
    </div>

    <button type="submit" class="btn-primary" [disabled]="loginForm.invalid || authService.isLoading()">
      <span *ngIf="authService.isLoading()" class="spinner material-icons-round">sync</span>
      <span *ngIf="!authService.isLoading()">Sign In</span>
    </button>
  </form>

  <div class="auth-footer">
    Don't have an account? <a routerLink="/auth/register">Sign up</a>
  </div>
</div>
