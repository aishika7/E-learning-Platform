<div class="auth-card">
  <div class="auth-header">
    <div class="brand-logo">
      <span class="material-icons-round">person_add</span>
    </div>
    <h2>Create an Account</h2>
    <p class="subtitle">Join ELearn to start learning</p>
  </div>

  <div *ngIf="errorMsg" class="error-alert">
    <span class="material-icons-round">error_outline</span>
    {{ errorMsg }}
  </div>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
    
    <div class="form-group">
      <label for="name">Full Name</label>
      <div class="input-wrapper">
        <span class="material-icons-round input-icon">badge</span>
        <input 
          id="name" 
          type="text" 
          formControlName="name" 
          placeholder="John Doe"
          [class.invalid]="registerForm.get('name')?.invalid && registerForm.get('name')?.touched"
        />
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <div class="input-wrapper">
        <span class="material-icons-round input-icon">email</span>
        <input 
          id="email" 
          type="email" 
          formControlName="email" 
          placeholder="you@example.com"
          [class.invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched"
        />
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrapper">
        <span class="material-icons-round input-icon">lock</span>
        <input 
          id="password" 
          type="password" 
          formControlName="password" 
          placeholder="Min. 8 characters"
          [class.invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched"
        />
      </div>
    </div>

    <div class="form-group">
      <label for="role">I want to...</label>
      <div class="input-wrapper">
        <span class="material-icons-round input-icon">school</span>
        <select id="role" formControlName="role" class="custom-select">
          <option value="student">Learn (Student)</option>
          <option value="instructor">Teach (Instructor)</option>
        </select>
      </div>
    </div>

    <button type="submit" class="btn-primary" [disabled]="registerForm.invalid || authService.isLoading()">
      <span *ngIf="authService.isLoading()" class="spinner material-icons-round">sync</span>
      <span *ngIf="!authService.isLoading()">Create Account</span>
    </button>
  </form>

  <div class="auth-footer">
    Already have an account? <a routerLink="/auth/login">Sign in</a>
  </div>
</div>
